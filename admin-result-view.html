       function isCorrect(userAnswer, correctAnswer) {

            if (userAnswer === undefined || userAnswer === null ||  String(userAnswer).trim() === '') return false;

            // Convert to string safely
            userAnswer = String(userAnswer).trim();
            correctAnswer = String(correctAnswer).trim();

            // MTA = Marks To All
            if (correctAnswer === 'MTA') {
                return true;
            }
           
            // RANGE case (3 to 6)
            if (correctAnswer.toLowerCase().includes('to')) {
                const [min, max] = correctAnswer
                    .split('to')
                    .map(x => Number(x.trim()));

                const userValue = Number(userAnswer);

                return userValue >= min && userValue <= max;
            }

            // OR case (3 OR -2)
            if (correctAnswer.includes('OR')) {
                const options = correctAnswer
                    .split('OR')
                    .map(a => a.trim());

                return options.includes(userAnswer);
            }

            // Multiple answers (B;C;D)
            if (correctAnswer.includes(';')) {
                const correct = correctAnswer
                    .split(';')
                    .map(a => a.trim())
                    .sort();

                const user = userAnswer
                    .split(';')
                    .map(a => a.trim())
                    .sort();

                if (correct.length !== user.length) return false;

                return correct.every((val, index) => val === user[index]);
            }

            // Normal answer
            return userAnswer === correctAnswer;
        }

        async function fetchStudentResponses() {
            const examModule = document.getElementById('examModule').value;
            const searchValue = document.getElementById('searchValue').value;

            try {
                const response = await fetch('/api/fetch_response', {
                    method: 'POST',
                   headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            searchValue,
                            examModule
                        })
                });
                const result = await response.json();
                displayResponses(result.data.uniqdata, examModule);
            } catch (error) {
                console.error('Error fetching responses:', error);
                document.getElementById('responseContent').innerHTML = '<p class="text-danger">There was an error fetching the responses. Please try again.</p>';
            }
        }

                                <td>${overallScores.highestScore.toFixed(2)}</td>
                                <td>${averageScore.toFixed(2)}</td>
                                <td>${overallScores.totalAttempted}</td>
                                <td>${overallScores.totalCorrect}</td>
                                <td>${overallScores.totalWrong}</td>
                                <td>${overallScores.totalNotAttempted}</td>
                              
                            </tr>
                        </tbody>
                     </table>
                    `;

            // Step 4: Question-wise Analysis
            html += `<h5 class="mt-4 font-weight-bold text-primary">Question-wise Analysis:</h5>
                     <table class="table table-bordered">
                        <thead style="text-align:center;">
                            <tr>
                                <th>Question</th>
                                <th>Total Attempted</th>
                                <th>Correct Answers</th>
                                <th>Wrong Answers</th>
                                <th>Not Attempted</th>
                                <th>Correct%</th>
                                <th>Wrong %</th>
                                <th>NA %</th>                           
                                <th>Hardness %</th>                            
                                <th>D-Level</th>                               
                            </tr>
                        </thead>
                        <tbody>`;

            // Initialize question-wise stats<!--   <th>Average Time Spent on Question (minutes)</th>-->
            const questionStats = {};
            const totalQuestions = Object.keys(answerKeys[examModule]).length;

            // Collect stats for each question
            scoreData.forEach(data => {
                const responsesObject = JSON.parse(data.responses);
                const timeArray = JSON.parse(data.correct);
              
               Object.keys(answerKeys[examModule]).forEach((question, index) => {

                    if (!questionStats[question]) {
                        questionStats[question] = {
                            totalAttempted: 0,
                            correct: 0,
                            wrong: 0,
                            notAttempted: 0,
                            wrongStudents: [],            
                            notAttemptedStudents: []      

                        };
                    }

                    const userAnswer = responsesObject[question];
                    const correctAnswer = answerKeys[examModule][question];

                    if (userAnswer === '' || userAnswer === 'Not Answered' || userAnswer === 'N') {

                        questionStats[question].notAttempted++;
                        questionStats[question].notAttemptedStudents.push({
                            name: data.name,
                            id: data.s_id
                        });


                    } 
                    else if (isCorrect(userAnswer, correctAnswer)) {

                        questionStats[question].correct++;

                    } 
                    else {

                        questionStats[question].wrong++;

                        questionStats[question].wrongStudents.push({
                            name: data.name,
                            id: data.s_id
                        });

                    }

                    questionStats[question].totalAttempted =
                        questionStats[question].correct + questionStats[question].wrong;

                });
            });

            // Calculate percentages and generate HTML
            Object.keys(questionStats).forEach(question => {
                const stats = questionStats[question];
                const totalStudents =  (stats.notAttempted+stats.totalAttempted);
                const correctPercentage = (stats.correct / (stats.totalAttempted || 1)) * 100; // Avoid division by zero
                const wrongPercentage =   (stats.wrong / (stats.totalAttempted || 1)) * 100;
                const naPercentage = (stats.notAttempted / (totalStudents || 1)) * 100;
                const hardness = ((stats.wrong +stats.notAttempted) / totalStudents) * 100;
                let difficultyLevel = "";
                        if (hardness >= 75) {
                    
                            difficultyLevel = `
                                <span class="badge bg-danger">
                                    Very Hard
                                </span>
                            `;
                    
                        } else if (hardness >= 50) {
                    
                            difficultyLevel = `
                                <span class="badge bg-warning text-dark">
                                    Hard
                                </span>
                            `;
                    
                        } else if (hardness >= 30) {
                    
                            difficultyLevel = `
                                <span class="badge bg-info text-dark">
                                    Medium
                                </span>
                            `;
                    
                        } else {
                    
                            difficultyLevel = `
                                <span class="badge bg-success">
                                    Easy
                                </span>
                            `;
                        }
                const wrongList = stats.wrongStudents
                    .map(s => `${s.name} (${s.id})`)
                    .join("; ");

                const naList = stats.notAttemptedStudents
                    .map(s => `${s.name} (${s.id})`)
                    .join("; ");

                //const averageTimeSpent = (stats.totalTime / overallScores.totalStudents) || 0;<!-- <td>${(averageTimeSpent).toFixed(2)} mins</td> -->
                html += `<tr style="text-align:center;">
                            <td>${question.toUpperCase()}</td>
                            <td>${stats.totalAttempted}</td>
                            <td>${stats.correct}</td>
                            <td>${stats.wrong}<br><small style="color:red">${wrongList || "-"}</small></td>
                            <td>${stats.notAttempted}<br><small style="color:gray">${naList || "-"}</small></td>
                            <td>${correctPercentage.toFixed(2)}%</td>
                            <td>${wrongPercentage.toFixed(2)}%</td>                
                            <td>${naPercentage.toFixed(2)}%</td>                    
                            <td>                    
                                <div class="progress" style="height:22px;">                    
                                    <div class="progress-bar bg-danger" role="progressbar" style="width:${hardness}%">                    
                                        ${hardness.toFixed(1)}%                   
                                    </div>                    
                                </div>                    
                            </td>                    
                            <td>
                                ${difficultyLevel}
                            </td>
                            </tr>`;
            });

            html += `</tbody></table></div> <button class="btn btn-secondary" onclick="printToPDF()">Print</button>`;

            // Display final HTML
            responseContent.innerHTML = html;
        }
