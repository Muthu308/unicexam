<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UNIC Academy Exam</title>

<style>
body { margin:0; font-family:Arial; }

.header {
    background:#0d1b2a;
    color:white;
    padding:10px;
    display:flex;
    justify-content:space-between;
}

/* LAYOUT */
.container { display:flex; }
.left { width:70%; padding:20px; }
.right { width:30%; background:#f1f1f1; padding:10px; }

/* MOBILE */
@media(max-width:768px){
    .container { flex-direction:column; }
    .left, .right { width:100%; }
}

/* SECTION TABS */
.section-tabs button {
    padding:8px 15px;
    margin:5px;
    border:none;
    background:#ecf0f1;
}
.section-tabs .active {
    background:#3498db;
    color:white;
}

/* PALETTE */
.palette {
    display:grid;
    grid-template-columns: repeat(5,1fr);
    gap:5px;
}
.palette button { height:40px; border:none; }

/* COLORS */
.answered { background:#2ecc71; color:white; }
.not-answered { background:#e74c3c; color:white; }
.visited { background:#f39c12; color:white; }
.current { background:#8e44ad; color:white; }
.review { background:#3498db; color:white; }

/* IMAGE */
.question-image {
    max-width:100%;
    height:auto;
    border:1px solid #ccc;
    margin-top:10px;
}

/* BUTTONS */
.btn-save { background:#2ecc71; color:white; }
.btn-review { background:#9b59b6; color:white; }
.submit-btn { width:100%; background:#e74c3c; color:white; margin-top:10px; }

</style>
</head>

<body>

<div class="header">
    <div>UNIC ACADEMY</div>
    <div id="candidate"></div>
    <div>⏱ <span id="timer"></span></div>
</div>

<div id="loginPage" style="text-align:center;margin-top:100px;">
    <input id="name" placeholder="Name"><br><br>
    <input id="id" placeholder="Student ID"><br><br>
    <button onclick="startExam()">Start</button>
</div>

<div id="examPage" style="display:none;">
<div class="container">

<div class="left">

<div id="sectionTabs" class="section-tabs"></div>

<div id="questionArea"></div>

<br>

<button onclick="clearResponse()">Clear</button>
<button class="btn-save" onclick="saveNext()">Save & Next</button>
<button class="btn-review" onclick="markReviewNext()">Mark Review</button>

</div>

<div class="right">

<div class="palette" id="palette"></div>

<button onclick="showPreview()">Preview</button>

<button class="submit-btn" onclick="submitExam()">Submit</button>

</div>

</div>
</div>

<script>
let questions=[], filteredQuestions=[];
let current=0;
let answers={}, review={}, visited={}, timeSpent={};
let student_id="", exam_module="UNIC_TEST_01";
let timeLeft=1800;
let isSubmitted=false;

// LOAD
fetch("questions_updated.json")
.then(r=>r.json())
.then(data=>{
    questions=data;
    filteredQuestions=data;
    buildSections();
    createPalette();
});

// LOGIN
function startExam(){
    student_id=document.getElementById("id").value;

    document.getElementById("candidate").innerText=
        document.getElementById("name").value+" | "+student_id;

    document.getElementById("loginPage").style.display="none";
    document.getElementById("examPage").style.display="block";

    showQuestion(0);
    startTimer();
}

// TIMER
function startTimer(){
    setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").innerText=
            Math.floor(timeLeft/60)+":"+timeLeft%60;

        if(timeLeft<=0){
            alert("Time Up");
            submitExam();
        }
    },1000);
}

// SECTION
function buildSections(){
    let sections=["All", ...new Set(questions.map(q=>q.section||"General"))];
    let html="";
    sections.forEach(s=>{
        html+=`<button onclick="filterSection('${s}')" id="sec_${s}">${s}</button>`;
    });
    document.getElementById("sectionTabs").innerHTML=html;
    document.getElementById("sec_All").classList.add("active");
}

function filterSection(sec){
    filteredQuestions = sec==="All"?questions:questions.filter(q=>q.section===sec);
    current=0;
    createPalette();
    showQuestion(0);
}

// PALETTE
function createPalette(){
    let p=document.getElementById("palette");
    p.innerHTML="";
    filteredQuestions.forEach((q,i)=>{
        let b=document.createElement("button");
        b.innerText=i+1;
        b.onclick=()=>showQuestion(i);
        p.appendChild(b);
    });
}

// SHOW
function showQuestion(i){
    current=i;
    let q=filteredQuestions[i];
    let key="q"+(i+1);

    let html=`<h3>${q.question}</h3>`;

    if(q.image_base64){
        html+=`<img class="question-image" src="data:image/jpeg;base64,${q.image_base64}">`;
    }

    if(q.type==="MCQ"){
        q.options.forEach(opt=>{
            html+=`<div><input type="radio"
            ${answers[key]==opt?"checked":""}
            onchange="saveAnswer('${opt}')"> ${opt}</div>`;
        });
    }

    if(q.type==="MSQ"){
        q.options.forEach(opt=>{
            html+=`<div><input type="checkbox"
            ${answers[key]?.split(";").includes(opt)?"checked":""}
            onchange="saveMSQ('${opt}',this.checked)"> ${opt}</div>`;
        });
    }

    if(q.type==="NAT"){
        html+=`<input type="number" oninput="saveNAT(this.value)">`;
    }

    document.getElementById("questionArea").innerHTML=html;
}

// SAVE
function saveAnswer(val){ answers["q"+(current+1)]=val; }
function saveMSQ(val,c){
    let key="q"+(current+1);
    let arr=answers[key]?answers[key].split(";"):[];
    if(c) arr.push(val);
    else arr=arr.filter(v=>v!==val);
    answers[key]=arr.join(";");
}
function saveNAT(val){ answers["q"+(current+1)]=val; }

// NAV
function saveNext(){ if(current<filteredQuestions.length-1) showQuestion(current+1); }
function markReviewNext(){ review[current]=true; saveNext(); }
function clearResponse(){ delete answers["q"+(current+1)]; showQuestion(current); }

// PREVIEW
function showPreview(){
    let html="<h2>Preview</h2>";
    questions.forEach((q,i)=>{
        html+=`Q${i+1}: ${answers["q"+(i+1)]||"N"}<br>`;
    });
    document.getElementById("questionArea").innerHTML=html;
}

// SUBMIT (VERCEL API)
function submitExam(){

    if(isSubmitted) return;
    isSubmitted=true;

    const responses={};

    questions.forEach((q,i)=>{
        let key="q"+(i+1);
        responses[key]=answers[key]||"N";
    });

    const variables={
        correct: JSON.stringify(timeSpent),
        marks: "0",
        responses: JSON.stringify(responses),
        email: student_id,
        s_id: student_id,
        exam_module: exam_module,
        name: document.getElementById("name").value
    };

    fetch("submit",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({variables})
    })
    .then(res=>res.json())
    .then(()=>{
        alert("Submitted ✅");
    })
    .catch(()=>alert("Error"));
}
</script>

</body>
</html>
