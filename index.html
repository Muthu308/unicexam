<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UNIC Academy Exam</title>

<style>
/* RESET */
body {
    margin: 0;
    font-family: Arial;
    padding-bottom: 70px; /* space for footer (desktop) */
}

/* HEADER */
.header {
    background: #0d1b2a;
    color: white;
    padding: 10px;
    display: flex;
    justify-content: space-between;
}

.logo { font-weight: bold; }
.tagline { font-size: 12px; }

/* LAYOUT */
.container {
    display: flex;
}

.left {
    width: 70%;
    padding: 10px;
    overflow: auto;
    scrollbar-width: thin;
    padding-bottom: 50px;
}

.right {
    width: 30%;
    background: #f1f1f1;
    padding: 10px;
}

/* MOBILE */
@media(max-width:768px){
    .container {
        flex-direction: column;
    }

    .left, .right {
        width: 100%;
    }

    body {
        padding-bottom: 0; /* remove fixed footer space */
    }
}

/* PALETTE */
.palette {
    display: grid;
    grid-template-columns: repeat(5,1fr);
    gap: 5px;
    border: 1px solid #ccc;
}

.palette button {
    height: 40px;
    border: none;
    border-radius: 5px;
}

/* COLORS (NTA STYLE) */
.answered { background: #2ecc71; color: white; }
.not-answered { background: #e74c3c; color: white; }
.visited { background: #f39c12; color: white; }
.current { background: #8e44ad; color: white; }
.review { background: #3498db; color: white; }

/* FOOTER CONTROLS (DESKTOP) */
.footer-controls {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    padding: 10px;
    text-align: center;
    border-top: 1px solid #ccc;
    z-index: 1000;
}

/* MOBILE FIX (VERY IMPORTANT) */
@media(max-width:768px){

    .footer-controls {
        position: relative;   /* remove fixed */
        bottom: auto;
        width: 100%;
        margin-top: 10px;
        border-top: none;
    }

    .footer-controls button {
        width: 45%;
        margin: 5px 2%;
    }
}

/* BUTTONS */
button {
    margin: 5px;
    padding: 8px;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.2s;
}

button:hover {
    opacity: 0.9;
}

/* IMAGE STYLING */
.question-image-container {
    max-width: 600px;
    margin: 2px;
}

.question-image {
    max-width: 100%;
    height: auto;              /* maintain ratio */
    border-radius: 6px;
    border: 1px solid #ccc;
    background: #fff;
    padding: 2px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

/* IMAGE HOVER (OPTIONAL ZOOM EFFECT) */
.question-image:hover {
    transform: scale(1.05);
    transition: 0.3s;
    cursor: zoom-in;
}

/* PREVIEW */
.preview-container {
    padding: 10px;
}

.preview-item {
    margin-bottom: 15px;
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

/* SCROLL IMPROVEMENT */
.left::-webkit-scrollbar {
    width: 6px;
}
.left::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="header">
    <div>
        <div class="logo">UNIC ACADEMY (since 2013)</div>
        <div class="tagline">Clarity - Confidence - Results</div>
    </div>
    <div id="candidate"></div>
    <div>⏱ <span id="timer"></span></div>
</div>

<div id="loginPage" style="text-align:center;margin-top:100px;">
    <h2>Login</h2>
    <input id="name" placeholder="Name"><br><br>
    <input id="id" placeholder="Student ID"><br><br>
    <button onclick="startExam()">Start Exam</button>
</div>

<div id="examPage" style="display:none;">
    <div class="container">

        <div class="left">
            <div id="questionArea"></div>
                <div>
        <button onclick="prevQ()">⬅ Prev</button>
        <button onclick="clearResponse()">Clear</button>
        <button onclick="markReview()">Mark Review</button>
        <button onclick="nextQ()">Next ➡</button>
    </div>
        </div>

  <div class="right">
    <div class="palette" id="palette"></div>

    <hr>

    <button onclick="showPreview()">👁 Preview</button>

    <br>

    <button 
        onclick="submitExam()" 
        style="width:100%; background:#e74c3c; color:white; font-weight:bold;">
        🚀 Submit Exam
    </button>

    <hr>

    <div >
        <div style="background:#2ecc71;color:white;">Answered</div>
        <div style="background:#e74c3c;color:white;">Not Answered</div>
        <div style="background:#f39c12;color:white;">Visited</div>
        <div style="background:#8e44ad;color:white;">Current</div>
        <div style="background:#3498db;color:white;">Review</div>
    </div>
</div>

    </div>

   <!-- <div class="footer-controls">
        <button onclick="prevQ()">⬅ Prev</button>
        <button onclick="clearResponse()">Clear</button>
        <button onclick="markReview()">Mark Review</button>
        <button onclick="nextQ()">Next ➡</button>
    </div>-->
</div>
        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script>
let questions = [];
let current = 0;

let answers = {};
let review = {};
let visited = {};
let timeSpent = {};

let start_time = new Date().toISOString();
let end_time = "";
let startTime = Date.now();

let student_id = "";
let exam_module = "UNIC_TEST_01";
let timeLeft = 2400;

// LOAD QUESTIONS
fetch("questions_updated.json")
.then(res=>res.json())
.then(data=>{
    questions=data;
    createPalette();
});

// LOGIN
function startExam(){
    student_id=document.getElementById("id").value;

    if(!student_id){
        alert("Enter ID"); return;
    }

    loadSavedData();

    document.getElementById("candidate").innerText =
        document.getElementById("name").value + " | " + student_id;

    document.getElementById("loginPage").style.display="none";
    document.getElementById("examPage").style.display="block";

    showQuestion(current);
    startTimer();
}

// TIMER
let timerInterval;

function startTimer(){
    timerInterval = setInterval(()=>{

        let min=Math.floor(timeLeft/60);
        let sec=timeLeft%60;

        document.getElementById("timer").innerText =
            min+":"+(sec<10?"0":"")+sec;

        timeLeft--;

        localStorage.setItem(student_id+"_time", timeLeft);

        // 🚀 AUTO SUBMIT
        if(timeLeft <= 0){

            clearInterval(timerInterval); // stop timer

            alert("⏰ Time Up! Submitting your exam...");

            submitExam(); // 🔥 IMPORTANT
        }

    },1000);
}

// SAVE / LOAD
function saveData(){
    let key = student_id + "_" + exam_module;

    localStorage.setItem(key, JSON.stringify({
        answers, review, visited, timeSpent, current, start_time
    }));
}

function loadSavedData(){
    let key = student_id + "_" + exam_module;
    let saved = JSON.parse(localStorage.getItem(key));

    if(saved){
        answers=saved.answers||{};
        review=saved.review||{};
        visited=saved.visited||{};
        timeSpent=saved.timeSpent||{};
        current=saved.current||0;
        start_time=saved.start_time||start_time;
    }

    let t = localStorage.getItem(student_id+"_time");
    if(t) timeLeft=t;
}

// PALETTE
function createPalette(){
    let p=document.getElementById("palette");

    questions.forEach((q,i)=>{
        let btn=document.createElement("button");
        btn.innerText=i+1;
        btn.id="p"+i;
        btn.onclick=()=>showQuestion(i);
        p.appendChild(btn);
    });
}

// SHOW QUESTION
function showQuestion(i){
    saveTime();
    current=i;
    visited[i]=true;

    let q=questions[i];
    let key="q"+(i+1);

    let html=`<h3>${q.question}</h3>`;

    if(q.image_base64){
        html+=`<div class="question-image-container">
    <img class="question-image"
    src="data:image/jpeg;base64,${q.image_base64}">
</div>`;
    }

    if(q.type==="MCQ"){
        q.options.forEach(opt=>{
            html+=`<div>
            <input type="radio" name="q${i}"
            ${answers[key]==opt?"checked":""}
            onchange="saveAnswer('${opt}')"> ${opt}
            </div>`;
        });
    }

    if(q.type==="MSQ"){
        q.options.forEach(opt=>{
            html+=`<div>
            <input type="checkbox"
            ${answers[key]?.split(";").includes(opt)?"checked":""}
            onchange="saveMSQ('${opt}', this.checked)"> ${opt}
            </div>`;
        });
    }

    if(q.type==="NAT"){
        html+=`<input type="number" step="any"
        value="${answers[key]||""}"
        oninput="saveNAT(this.value)"
        placeholder="Enter numeric answer">`;
    }

    if(q.type==="SA"){
        html+=`<textarea onchange="saveAnswer(this.value)">
        ${answers[key]||""}</textarea>`;
    }

    document.getElementById("questionArea").innerHTML=html;

    updatePalette();
    startTime=Date.now();
}

// SAVE
function saveAnswer(val){
    answers["q"+(current+1)]=val;
    saveData();
}

function saveMSQ(val,checked){
    let key="q"+(current+1);
    let arr=answers[key]?answers[key].split(";"):[];
    if(checked){ if(!arr.includes(val)) arr.push(val); }
    else arr=arr.filter(v=>v!==val);

    if(arr.length===0) delete answers[key];
    else answers[key]=arr.join(";");
}

function saveNAT(val){
    let key = "q"+(current+1);

    // Handle empty properly
    if(val === "" || val === null){
        delete answers[key];
    } else {
        answers[key] = parseFloat(val);
    }

    saveData();
    updatePalette();
}

// TIME TRACK
function saveTime(){
    let spent=Math.floor((Date.now()-startTime)/1000);
    timeSpent[current]=(timeSpent[current]||0)+spent;
}

// NAV
function nextQ(){
    saveTime();
    saveData();

    if(current<questions.length-1) showQuestion(current+1);
}

function prevQ(){
    if(current>0) showQuestion(current-1);
}

// REVIEW
function markReview(){
    review[current]=true;
    saveData();
    nextQ();
}

// CLEAR
function clearResponse(){
    delete answers["q"+(current+1)];
    saveData();
    showQuestion(current);
}

// COLORS
function updatePalette(){
    questions.forEach((q,i)=>{
        let btn=document.getElementById("p"+i);
        btn.className="";

        let key="q"+(i+1);

        if(i===current) btn.classList.add("current");
        else if(review[i]) btn.classList.add("review");
        else if(answers[key]) btn.classList.add("answered");
        else if(visited[i]) btn.classList.add("not-answered");
    });
}

// PREVIEW (WITH IMAGE)
function showPreview(){

    let html = `<div class="preview-container"><h2>Preview</h2>`;

    questions.forEach((q,i)=>{

        let key = "q"+(i+1);
        let ans = answers[key] || "Not Answered";

        html += `<div class="preview-item">
            <b>Q${i+1}:</b> ${JSON.stringify(ans)}<br>`;

        if(q.image_base64){
            html += `
            <div class="question-image-container">
                <img class="question-image"
                src="data:image/jpeg;base64,${q.image_base64}">
            </div>`;
        }

        html += `</div>`;
    });

    html += `</div>`;

    document.getElementById("questionArea").innerHTML = html;
}

function checkSubmitReady(){
    let total = questions.length;
    let answered = Object.keys(answers).length;

    let btn = document.getElementById("submitBtn");

    if(answered === 0){
        btn.disabled = true;
        btn.style.opacity = 0.5;
    } else {
        btn.disabled = false;
        btn.style.opacity = 1;
    }
}

 
    let isSubmitted = false;   
    
function submitExam(){
    if(isSubmitted) return; // 🚀 prevent duplicate
    isSubmitted = true;

    let end_time = new Date().toISOString();

    // ✅ Build responses (correct format)
    const responses = {};

    questions.forEach((q, i) => {
        let key = "q" + (i + 1);

        if (!answers[key] || answers[key] === "") {
            responses[key] = "N";
        } else {
            responses[key] = answers[key];
        }
    });

    // ✅ Final data object
    const data = {
        email: student_id,
        name: document.getElementById("name").value,
        s_id: student_id,
        exam_module: exam_module,
        start_time: start_time,
        end_time: end_time,
        time_spent: timeSpent
    };

    console.log("Responses:", responses);
    console.log("Data:", data);

    // ✅ GraphQL mutation
    const mutation = `
    mutation InsertUniqdata(
        $correct: String, 
        $marks: String, 
        $responses: String, 
        $email: String, 
        $s_id: String, 
        $name: String, 
        $exam_module: String
    ) {
        insert_uniqdata(objects: {
            correct: $correct,
            marks: $marks,
            responses: $responses,
            email: $email,
            s_id: $s_id,
            exam_module: $exam_module,
            name: $name
        }) {
            affected_rows
        }
    }`;

    const variables = {
        correct: JSON.stringify(data.time_spent),
        marks: data.end_time + data.start_time,
        responses: JSON.stringify(responses),
        email: data.email,
        s_id: data.s_id,
        exam_module: data.exam_module,
        name: data.name
    };

    console.log("Variables:", variables);

    fetch("https://merry-lemur-83.hasura.app/v1/graphql", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "x-hasura-admin-secret": "NXkzUaSjIx29YWuWf7I9GgOPddk6Vbfm13qt1cQ4UjSW9GucPNMP3irFvs4m0lLU"
        },
        body: JSON.stringify({
            query: mutation,
            variables: variables
        })
    })
    .then(res => res.json())
    .then(result => {
        console.log("Result:", result);

        if(result.errors){
            alert("❌ Error submitting form");
        } else {
            alert("✅ Submitted Successfully");
            document.body.innerHTML = "<h2 style='text-align:center'>Exam Submitted ✅</h2>";
            localStorage.clear();
        }
    })
    .catch(error => {
        console.error("Error:", error);
        alert("❌ Submission failed");
    });
}
</script>

</body>
</html>
