
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
}

.dashboard{
    display:flex;
    min-height:100vh;
}

/* Sidebar */

.sidebar{
    width:260px;
    background:linear-gradient(180deg,#0f172a,#1e293b);
    color:white;
    padding:25px;
    position:fixed;
    height:100%;
}

.logo{
    text-align:center;
    margin-bottom:40px;
}

.logo h2{
    font-size:26px;
}

.menu a{
    display:block;
    color:white;
    text-decoration:none;
    padding:14px;
    margin-bottom:10px;
    border-radius:12px;
    transition:.3s;
}

.menu a:hover{
    background:rgba(255,255,255,.1);
}

/* Main */

.main{
    margin-left:260px;
    width:calc(100% - 260px);
    padding:25px;
}

.header{
    background:white;
    border-radius:16px;
    padding:25px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
    margin-bottom:20px;
}

.header h1{
    color:#1e293b;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:white;
    border-radius:16px;
    padding:20px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.card h3{
    color:#64748b;
    margin-bottom:10px;
}

.card p{
    font-size:24px;
    font-weight:700;
}

.section{
    background:white;
    border-radius:16px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.section h2{
    margin-bottom:15px;
    color:#1e293b;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#2563eb;
    color:white;
    padding:12px;
}

table td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #eee;
}

table tr:hover{
    background:#f8fafc;
}

iframe{
    width:100%;
    height:700px;
    border:none;
    border-radius:10px;
}

.btn{
    display:inline-block;
    padding:12px 18px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
    margin-bottom:15px;
}

.student-profile-card{

    background:#fff;

    border-radius:20px;

    padding:25px;

    box-shadow:0 4px 15px rgba(0,0,0,.08);

}

.student-header{

    display:flex;

    align-items:center;

    gap:20px;

    margin-bottom:25px;

    padding-bottom:20px;

    border-bottom:1px solid #e5e7eb;

}

.student-avatar{

    width:80px;

    height:80px;

    border-radius:50%;

    background:#2563eb;

    color:white;

    font-size:35px;

    display:flex;

    align-items:center;

    justify-content:center;

}

.student-header h2{

    margin:0;

    color:#1e293b;

}

.student-header p{

    color:#64748b;

}

.profile-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:15px;

}

.profile-item{

    background:#f8fafc;

    padding:15px;

    border-radius:12px;

}

.profile-item label{

    display:block;

    font-size:13px;

    color:#64748b;

    margin-bottom:5px;

}

.profile-item strong{

    color:#111827;

    font-size:15px;

}

.status{

    color:#16a34a;

}

@media(max-width:768px){

.sidebar{
    width:100%;
    height:auto;
    position:relative;
}

.main{
    margin-left:0;
    width:100%;
}

.dashboard{
    flex-direction:column;
}

}
 .pdf-btn{

    background:#2563eb;
    color:#fff;

    border:none;

    padding:10px 15px;

    border-radius:8px;

    cursor:pointer;

    margin:4px;

}

.pdf-btn:hover{

    background:#1d4ed8;

}   

</style>
</head>
<body>

<div class="dashboard">

<div class="sidebar">

<div class="logo">
<h2>🎓 Student Portal</h2>
</div>

<div class="menu">

    <a href="#profile">👤 Profile</a>

    <a href="#summary">📈 Summary</a>

    <a href="#results">📊 Results</a>

    <a href="#analysis">📋 Analysis</a>

    <a href="#pdf">📄 Result PDF</a>

    <a href="#" onclick="logout()">🚪 Logout</a>

</div>

</div>

<div class="main">

<div class="header">
<h1 id="studentName">Loading...</h1>
<p>Welcome to your Academic Dashboard</p>
</div>
<div class="section student-profile-card">

    <div class="student-header">

        <div class="student-avatar">
            👨‍🎓
        </div>

        <div>
            <h2 id="p_name">Student Name</h2>
            <p id="p_stdid">Student ID</p>
        </div>

    </div>

    <div class="profile-grid">

        <div class="profile-item">
            <label>Email</label>
            <strong id="p_email">-</strong>
        </div>

        <div class="profile-item">
            <label>Mobile</label>
            <strong id="p_mobile">-</strong>
        </div>

        <div class="profile-item">
            <label>Class</label>
            <strong id="studentClass">-</strong>
        </div>

        <div class="profile-item">
            <label>School</label>
            <strong id="schoolName">-</strong>
        </div>

        <div class="profile-item">
            <label>Status</label>
            <strong class="status">Active</strong>
        </div>

        <div class="profile-item">
            <label>Student ID</label>
            <strong id="stdId">-</strong>
        </div>

    </div>

</div>


<div class="section" id="results">

    <h2>Exam Results</h2>

    <table>

        <thead>
            <tr>
                <th>Exam</th>
                <th>Physics</th>
                <th>Chemistry</th>
                <th>Maths</th>
                <th>Total Marks</th>
                <th>Percentage</th>
                <th>Rank</th>
            </tr>
        </thead>

        <tbody id="resultTable">
            <tr>
                <td colspan="7">Loading Results...</td>
            </tr>
        </tbody>

    </table>

</div>

<div id="resultContent"></div>

<div class="section" id="pdf">

    <h2>📄 Result PDF Viewer</h2>

    <div id="pdfButtons"></div>

    <br>

    <iframe
        id="pdfFrame"
        width="100%"
        height="700">
    </iframe>

</div>
</div>

<script>

const user = JSON.parse(localStorage.getItem("student"));

if (!user) {
  window.location.href = "studlogin.html";
}

document.getElementById("studentName").innerText = user.name;
document.getElementById("stdId").innerText = user.std_id;
document.getElementById("p_name").innerText =
user.name || "-";

document.getElementById("p_stdid").innerText =
user.std_id || "-";

document.getElementById("stdId").innerText =
user.std_id || "-";

document.getElementById("studentClass").innerText =
user.class || "-";

document.getElementById("schoolName").innerText =
user.school || "-";

document.getElementById("p_email").innerText =
user.email || "-";

document.getElementById("p_mobile").innerText =
user.mobile || "-";
// Load Exam Results
async function loadStudentResults() {

    try {

        const res = await fetch("students.json");
        const data = await res.json();

        const results = data.filter(
            item => String(item.s_id) === String(user.std_id)
        );

        if (!results.length) {

            document.getElementById("resultTable").innerHTML =
                `<tr><td colspan="7">No Results Found</td></tr>`;

            return;
        }

        let rows = "";

        let totalMarks = 0;
        let totalPercentage = 0;

        let totalCorrect = 0;
        let totalWrong = 0;
        let totalNotAttempted = 0;

        let bestPercentage = 0;
        let bestExam = "-";

        results.forEach(r => {

            rows += `
                <tr>
                    <td>${r.exam_name}</td>
                    <td>${r.ph}</td>
                    <td>${r.cy}</td>
                    <td>${r.ma}</td>
                    <td>${r.final_marks}</td>
                    <td>${r.percentage}%</td>
                    <td>#${r.rank}</td>
                </tr>
            `;

            totalMarks += Number(r.final_marks);
            totalPercentage += Number(r.percentage);

            totalCorrect += Number(r.correct);
            totalWrong += Number(r.wrong);
            totalNotAttempted += Number(r.not_attempted);

            if (Number(r.percentage) > bestPercentage) {
                bestPercentage = Number(r.percentage);
                bestExam = r.exam_name;
            }

        });

        document.getElementById("resultTable").innerHTML = rows;

        const avgMarks =
            (totalMarks / results.length).toFixed(2);

        const avgPercentage =
            (totalPercentage / results.length).toFixed(2);

        document.getElementById("resultContent").innerHTML = `

        <div class="section">

            <h2>Performance Summary</h2>

            <div class="cards">

                <div class="card">
                    <h3>Total Exams</h3>
                    <p>${results.length}</p>
                </div>

                <div class="card">
                    <h3>Average Marks</h3>
                    <p>${avgMarks}</p>
                </div>

                <div class="card">
                    <h3>Average %</h3>
                    <p>${avgPercentage}%</p>
                </div>

                <div class="card">
                    <h3>Best Exam</h3>
                    <p>${bestExam}</p>
                </div>

                <div class="card">
                    <h3>Total Correct</h3>
                    <p>${totalCorrect}</p>
                </div>

                <div class="card">
                    <h3>Total Wrong</h3>
                    <p>${totalWrong}</p>
                </div>

                <div class="card">
                    <h3>Not Attempted</h3>
                    <p>${totalNotAttempted}</p>
                </div>

            </div>

        </div>

        <div class="section">

            <h2>Exam Analysis</h2>

            <table>

                <thead>
                    <tr>
                        <th>Exam</th>
                        <th>Correct</th>
                        <th>Wrong</th>
                        <th>Not Attempted</th>
                    </tr>
                </thead>

                <tbody>

                ${results.map(r => `
                    <tr>
                        <td>${r.exam_name}</td>
                        <td>${r.correct}</td>
                        <td>${r.wrong}</td>
                        <td>${r.not_attempted}</td>
                    </tr>
                `).join("")}

                </tbody>

            </table>

        </div>

        <div class="section">

            <h2>Subject Wise Analysis</h2>

            <table>

                <thead>

                    <tr>
                        <th>Exam</th>
                        <th>Physics</th>
                        <th>Chemistry</th>
                        <th>Mathematics</th>
                    </tr>

                </thead>

                <tbody>

                ${results.map(r => `
                    <tr>

                        <td>${r.exam_name}</td>

                        <td>
                            Correct: ${r.ph_correct}<br>
                            Wrong: ${r.ph_wrong}<br>
                            NA: ${r.ph_not_attempted}
                        </td>

                        <td>
                            Correct: ${r.cy_correct}<br>
                            Wrong: ${r.cy_wrong}<br>
                            NA: ${r.cy_not_attempted}
                        </td>

                        <td>
                            Correct: ${r.ma_correct}<br>
                            Wrong: ${r.ma_wrong}<br>
                            NA: ${r.ma_not_attempted}
                        </td>

                    </tr>
                `).join("")}

                </tbody>

            </table>

        </div>

        `;

    }
    catch(err) {

        console.error(err);

        document.getElementById("resultTable").innerHTML =
            `<tr><td colspan="7">Error loading results</td></tr>`;
    }

}

// Load PDF
  let studentPdfs = [];  
async function loadPdf() {

    try {

        const res = await fetch("drive_link.json");
        const pdfs = await res.json();

        studentPdfs = pdfs.filter(
            p => String(p.std_id) === String(user.std_id)
        );

        if (!studentPdfs.length) {

            document.getElementById("pdfButtons").innerHTML =
                "<p>No PDFs Available</p>";

            return;
        }

        let html = "";

        studentPdfs.forEach(pdf => {

            html += `
                <button
                    class="pdf-btn"
                    onclick="showPdf('${pdf.exam_name}')">

                    ${pdf.exam_name}

                </button>
            `;
        });

        document.getElementById("pdfButtons").innerHTML = html;

    }
    catch(err) {

        console.error(err);

    }

}
    function showPdf(examName) {

    const pdf = studentPdfs.find(
        p => p.exam_name === examName
    );

    if (!pdf) return;

    document.getElementById("pdfFrame").src =
        pdf.pdf_url;
}
loadStudentResults();
loadPdf();



</script>

</body>
</html>
