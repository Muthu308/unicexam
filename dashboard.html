
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
}

.dashboard{
    display:flex;
    min-height:100vh;
}

/* Sidebar */

.sidebar{
    width:260px;
    background:linear-gradient(180deg,#0f172a,#1e293b);
    color:white;
    padding:25px;
    position:fixed;
    height:100%;
}

.logo{
    text-align:center;
    margin-bottom:40px;
}

.logo h2{
    font-size:26px;
}

.menu a{
    display:block;
    color:white;
    text-decoration:none;
    padding:14px;
    margin-bottom:10px;
    border-radius:12px;
    transition:.3s;
}

.menu a:hover{
    background:rgba(255,255,255,.1);
}

/* Main */

.main{
    margin-left:260px;
    width:calc(100% - 260px);
    padding:25px;
}

.header{
    background:white;
    border-radius:16px;
    padding:25px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
    margin-bottom:20px;
}

.header h1{
    color:#1e293b;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:white;
    border-radius:16px;
    padding:20px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.card h3{
    color:#64748b;
    margin-bottom:10px;
}

.card p{
    font-size:24px;
    font-weight:700;
}

.section{
    background:white;
    border-radius:16px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.section h2{
    margin-bottom:15px;
    color:#1e293b;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#2563eb;
    color:white;
    padding:12px;
}

table td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #eee;
}

table tr:hover{
    background:#f8fafc;
}

iframe{
    width:100%;
    height:700px;
    border:none;
    border-radius:10px;
}

.btn{
    display:inline-block;
    padding:12px 18px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
    margin-bottom:15px;
}

.student-profile-card{

    background:#fff;

    border-radius:20px;

    padding:25px;

    box-shadow:0 4px 15px rgba(0,0,0,.08);

}

.student-header{

    display:flex;

    align-items:center;

    gap:20px;

    margin-bottom:25px;

    padding-bottom:20px;

    border-bottom:1px solid #e5e7eb;

}

.student-avatar{

    width:80px;

    height:80px;

    border-radius:50%;

    background:#2563eb;

    color:white;

    font-size:35px;

    display:flex;

    align-items:center;

    justify-content:center;

}

.student-header h2{

    margin:0;

    color:#1e293b;

}

.student-header p{

    color:#64748b;

}

.profile-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:15px;

}

.profile-item{

    background:#f8fafc;

    padding:15px;

    border-radius:12px;

}

.profile-item label{

    display:block;

    font-size:13px;

    color:#64748b;

    margin-bottom:5px;

}

.profile-item strong{

    color:#111827;

    font-size:15px;

}

.status{

    color:#16a34a;

}

@media(max-width:768px){

.sidebar{
    width:100%;
    height:auto;
    position:relative;
}

.main{
    margin-left:0;
    width:100%;
}

.dashboard{
    flex-direction:column;
}

}
    

</style>
</head>
<body>

<div class="dashboard">

<div class="sidebar">

<div class="logo">
<h2>🎓 Student Portal</h2>
</div>

<div class="menu">

    <a href="#profile">👤 Profile</a>

    <a href="#summary">📈 Summary</a>

    <a href="#results">📊 Results</a>

    <a href="#analysis">📋 Analysis</a>

    <a href="#pdf">📄 Result PDF</a>

    <a href="#" onclick="logout()">🚪 Logout</a>

</div>

</div>

<div class="main">

<div class="header">
<h1 id="studentName">Loading...</h1>
<p>Welcome to your Academic Dashboard</p>
</div>
<div class="section student-profile-card">

    <div class="student-header">

        <div class="student-avatar">
            👨‍🎓
        </div>

        <div>
            <h2 id="p_name">Student Name</h2>
            <p id="p_stdid">Student ID</p>
        </div>

    </div>

    <div class="profile-grid">

        <div class="profile-item">
            <label>Email</label>
            <strong id="p_email">-</strong>
        </div>

        <div class="profile-item">
            <label>Mobile</label>
            <strong id="p_mobile">-</strong>
        </div>

        <div class="profile-item">
            <label>Class</label>
            <strong id="studentClass">-</strong>
        </div>

        <div class="profile-item">
            <label>School</label>
            <strong id="schoolName">-</strong>
        </div>

        <div class="profile-item">
            <label>Status</label>
            <strong class="status">Active</strong>
        </div>

        <div class="profile-item">
            <label>Student ID</label>
            <strong id="stdId">-</strong>
        </div>

    </div>

</div>


<div class="section" id="results">

<h2>Exam Results</h2>

<table>
<thead>
<tr>
<th>Exam</th>
<th>Maths</th>
<th>Science</th>
<th>English</th>
<th>Total</th>
<th>Percentage</th>
</tr>
</thead>

<tbody id="resultTable">
<tr>
<td colspan="6">Loading Results...</td>
</tr>
</tbody>

</table>

</div>

<div id="resultContent"></div>

<a id="downloadBtn" class="btn" target="_blank">
📥 Download Result PDF
</a>

<iframe id="pdfFrame"></iframe>

</div>
</div>

<script>

const user = JSON.parse(localStorage.getItem("student"));

if (!user) {
  window.location.href = "studlogin.html";
}

document.getElementById("studentName").innerText = user.name;
document.getElementById("stdId").innerText = user.std_id;

// Load Exam Results
async function loadStudentResults() {
  try {
    const res = await fetch("students.json");
    const data = await res.json();

    const student = data.find(
      s => String(s.s_id) === String(user.std_id)
    );

    if (!student) {
      document.getElementById("resultContent").innerHTML =
        "<h3>No Result Found</h3>";
      return;
    }

    document.getElementById("resultContent").innerHTML = `

      <div class="cards">

        <div class="card">
          <h3>Exam</h3>
          <p>${student.exam_name}</p>
        </div>

        <div class="card">
          <h3>Marks</h3>
          <p>${student.final_marks}/200</p>
        </div>

        <div class="card">
          <h3>Percentage</h3>
          <p>${student.percentage}%</p>
        </div>

        <div class="card">
          <h3>Rank</h3>
          <p>#${student.rank}</p>
        </div>

        <div class="card">
          <h3>Band</h3>
          <p>${student.band}</p>
        </div>

      </div>

      <h2>Subject Wise Marks</h2>

      <table class="table">
        <thead>
          <tr>
            <th>Subject</th>
            <th>Marks</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>Physics</td>
            <td>${student.ph}</td>
          </tr>

          <tr>
            <td>Chemistry</td>
            <td>${student.cy}</td>
          </tr>

          <tr>
            <td>Mathematics</td>
            <td>${student.ma}</td>
          </tr>
        </tbody>
      </table>

      <br>

      <h2>Attempt Analysis</h2>

      <table class="table">
        <thead>
          <tr>
            <th>Subject</th>
            <th>Correct</th>
            <th>Wrong</th>
            <th>Not Attempted</th>
          </tr>
        </thead>

        <tbody>

          <tr>
            <td>Physics</td>
            <td>${student.ph_correct}</td>
            <td>${student.ph_wrong}</td>
            <td>${student.ph_not_attempted}</td>
          </tr>

          <tr>
            <td>Chemistry</td>
            <td>${student.cy_correct}</td>
            <td>${student.cy_wrong}</td>
            <td>${student.cy_not_attempted}</td>
          </tr>

          <tr>
            <td>Mathematics</td>
            <td>${student.ma_correct}</td>
            <td>${student.ma_wrong}</td>
            <td>${student.ma_not_attempted}</td>
          </tr>

        </tbody>
      </table>

      <br>

      <h2>Overall Statistics</h2>

      <table class="table">
        <tbody>

          <tr>
            <td>Total Correct</td>
            <td>${student.correct}</td>
          </tr>

          <tr>
            <td>Total Wrong</td>
            <td>${student.wrong}</td>
          </tr>

          <tr>
            <td>Not Attempted</td>
            <td>${student.not_attempted}</td>
          </tr>

          <tr>
            <td>Bonus Marks</td>
            <td>${student.bonus}</td>
          </tr>

          <tr>
            <td>Final Marks</td>
            <td>${student.final_marks}</td>
          </tr>

        </tbody>
      </table>
    `;

  } catch (err) {
    console.error(err);
  }
}

// Load PDF
async function loadPdf() {
  try {

    const res = await fetch("drive_link.json");
    const pdfs = await res.json();

    const pdf = pdfs.find(
      p => String(p.std_id) === String(user.std_id)
    );

    if (!pdf) return;

    document.getElementById("pdfFrame").src =
      pdf.pdf_url;

    document.getElementById("downloadBtn").href =
      pdf.pdf_url;

  } catch (err) {
    console.error(err);
  }
}

loadStudentResults();
loadPdf();



</script>

</body>
</html>
